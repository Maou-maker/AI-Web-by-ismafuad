<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow v2 - Gemini</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 450px;
            text-align: center;
        }

        /* Atur Waktu Section */
        .setup-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
            width: 60px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        .instruction { font-size: 0.85rem; color: #888; flex: 1; margin: 0 15px; }

        .btn-start {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Waktu Berjalan */
        .timer-display {
            font-size: 6rem;
            font-weight: 900;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        /* Music Selection */
        .music-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .music-card {
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .music-card.playing {
            border-color: var(--accent);
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent);
        }

        .music-card:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-row">
        <input type="number" id="inputMin" value="25" min="1" max="999">
        <span class="instruction">Atur menit, lalu tekan mulai</span>
        <button class="btn-start" id="mainActionBtn">MULAI</button>
    </div>

    <div class="timer-display" id="timer">25:00</div>

    <div class="music-panel">
        <div class="music-card" onclick="playMusic('rain', this)">🌧️ Hujan</div>
        <div class="music-card" onclick="playMusic('lofi', this)">🎧 Lofi</div>
        <div class="music-card" onclick="playMusic('cafe', this)">☕ Cafe</div>
    </div>
</div>

<audio id="rain" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
<audio id="lofi" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<audio id="cafe" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

<script>
    let timeLeft;
    let timerId = null;
    const timerDisplay = document.getElementById('timer');
    const inputMin = document.getElementById('inputMin');
    const mainBtn = document.getElementById('mainActionBtn');

    // Sync input ke display awal
    inputMin.addEventListener('input', () => {
        if(!timerId) timerDisplay.textContent = `${inputMin.value.padStart(2, '0')}:00`;
    });

    mainBtn.addEventListener('click', () => {
        if (timerId) {
            // Stop/Pause Logic
            clearInterval(timerId);
            timerId = null;
            mainBtn.textContent = 'MULAI';
            mainBtn.style.background = 'var(--accent)';
        } else {
            // Start Logic
            if (!timeLeft || timeLeft <= 0 || mainBtn.textContent === 'MULAI') {
                timeLeft = parseInt(inputMin.value) * 60;
            }
            
            mainBtn.textContent = 'PAUSE';
            mainBtn.style.background = '#ff4444';

            timerId = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    mainBtn.textContent = 'MULAI';
                    alert('Waktu habis!');
                }
            }, 1000);
        }
    });

    function playMusic(id, el) {
        const allAudio = document.querySelectorAll('audio');
        const allCards = document.querySelectorAll('.music-card');
        const targetAudio = document.getElementById(id);

        // Jika lagu yang sama di-klik lagi, maka stop
        if (!targetAudio.paused) {
            targetAudio.pause();
            el.classList.remove('playing');
            return;
        }

        // Matikan semua musik dulu biar gak tabrakan
        allAudio.forEach(a => { a.pause(); a.currentTime = 0; });
        allCards.forEach(c => c.classList.remove('playing'));

        // Play yang dipilih
        targetAudio.play().catch(e => console.log("User must interact first"));
        el.classList.add('playing');
    }
</script>

</body>
</html>
