<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BukuKas — Catatan Keuangan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f2eb;
    --paper:    #faf8f3;
    --ink:      #1a1814;
    --ink2:     #4a4640;
    --ink3:     #9a958e;
    --rule:     #e0dbd0;
    --green:    #2d6a4f;
    --green-bg: #d8f3dc;
    --red:      #c1121f;
    --red-bg:   #ffe0e0;
    --accent:   #b5451b;
    --accent-bg:#fde8df;
    --gold:     #c9820a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inconsolata', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        var(--rule) 27px,
        var(--rule) 28px
      );
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 22px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  .header-meta { font-size: 0.78rem; color: #9a958e; font-weight: 300; }

  /* ── CONTAINER ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }

  /* ── SUMMARY CARDS ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .sum-card {
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .sum-card:hover { transform: translateY(-2px); }
  .sum-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .sum-card.saldo-awal::before  { background: var(--ink3); }
  .sum-card.pengeluaran::before { background: var(--red); }
  .sum-card.saldo-akhir::before { background: var(--green); }
  .sum-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink3);
    margin-bottom: 8px;
  }
  .sum-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--ink);
  }
  .sum-card.pengeluaran .sum-value { color: var(--red); }
  .sum-card.saldo-akhir .sum-value { color: var(--green); }
  .sum-sub { font-size: 0.72rem; color: var(--ink3); margin-top: 4px; }

  /* ── FORM ── */
  .form-section {
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 28px;
  }
  .form-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-title::before {
    content: '//';
    color: var(--accent);
    font-family: 'Inconsolata', monospace;
  }
  .form-row {
    display: grid;
    grid-template-columns: 160px 1fr 180px 180px 180px auto;
    gap: 12px;
    align-items: end;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink3);
  }
  input, textarea {
    background: var(--bg);
    border: 1.5px solid var(--rule);
    color: var(--ink);
    padding: 9px 12px;
    font-family: 'Inconsolata', monospace;
    font-size: 0.88rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus { border-color: var(--accent); background: #fff; }
  input[type="number"] { text-align: right; }

  .btn-add {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    height: fit-content;
  }
  .btn-add:hover { background: var(--accent); transform: translateY(-1px); }

  /* ── TABLE ── */
  .table-section {
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
  }
  .table-header {
    padding: 16px 24px;
    border-bottom: 1.5px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .table-actions { display: flex; gap: 8px; }
  .btn-sm {
    font-family: 'Inconsolata', monospace;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    border: 1.5px solid;
    transition: all 0.15s;
    font-weight: 500;
  }
  .btn-export {
    border-color: var(--green);
    color: var(--green);
    background: transparent;
  }
  .btn-export:hover { background: var(--green-bg); }
  .btn-clear {
    border-color: var(--red);
    color: var(--red);
    background: transparent;
  }
  .btn-clear:hover { background: var(--red-bg); }

  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: var(--ink);
    color: var(--bg);
  }
  th {
    padding: 11px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    text-align: left;
  }
  th.num { text-align: right; }
  td {
    padding: 11px 16px;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
  }
  td.num { text-align: right; font-weight: 500; }
  td.date { color: var(--ink3); font-size: 0.8rem; white-space: nowrap; }
  td.keterangan { color: var(--ink2); }

  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: #f0ece3; }
  tbody tr:last-child td { border-bottom: none; }

  .amount-out { color: var(--red); }
  .amount-in  { color: var(--green); }
  .amount-bal { color: var(--ink); font-weight: 600; }

  /* saldo negatif */
  .amount-bal.negative { color: var(--red); }

  .row-num {
    font-size: 0.7rem;
    color: var(--ink3);
    font-weight: 300;
    min-width: 28px;
  }

  .btn-del {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink3);
    width: 26px; height: 26px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-del:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* ── FOOTER ROW ── */
  tfoot tr { background: var(--accent-bg); }
  tfoot td {
    padding: 12px 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    border-top: 2px solid var(--accent);
    color: var(--accent);
  }
  tfoot td.num { text-align: right; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink3);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-text { font-size: 0.85rem; }

  /* ── TOAST ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--ink);
    color: var(--bg);
    padding: 11px 18px;
    border-radius: 3px;
    font-size: 0.82rem;
    border-left: 3px solid var(--accent);
    animation: slideIn 0.25s ease;
    display: flex; align-items: center; gap: 8px;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .summary { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
    .container { padding: 20px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Buku<span>Kas</span></div>
  <div class="header-meta" id="headerDate"></div>
</header>

<div class="container">

  <!-- SUMMARY -->
  <div class="summary">
    <div class="sum-card saldo-awal">
      <div class="sum-label">Total Saldo Awal</div>
      <div class="sum-value" id="sum-awal">Rp 0</div>
      <div class="sum-sub">Akumulasi semua entri</div>
    </div>
    <div class="sum-card pengeluaran">
      <div class="sum-label">Total Pengeluaran</div>
      <div class="sum-value" id="sum-keluar">Rp 0</div>
      <div class="sum-sub">Seluruh transaksi keluar</div>
    </div>
    <div class="sum-card saldo-akhir">
      <div class="sum-label">Saldo Akhir Sekarang</div>
      <div class="sum-value" id="sum-akhir">Rp 0</div>
      <div class="sum-sub">Saldo awal − pengeluaran</div>
    </div>
  </div>

  <!-- FORM INPUT -->
  <div class="form-section">
    <div class="form-title">Input Transaksi Baru</div>
    <div class="form-row">
      <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="f-tanggal">
      </div>
      <div class="form-group">
        <label>Keterangan</label>
        <input type="text" id="f-keterangan" placeholder="Deskripsi transaksi...">
      </div>
      <div class="form-group">
        <label>Saldo Awal (Rp)</label>
        <input type="number" id="f-saldo-awal" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Pengeluaran (Rp)</label>
        <input type="number" id="f-pengeluaran" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Saldo Akhir (otomatis)</label>
        <input type="number" id="f-saldo-akhir" placeholder="0" readonly
          style="background:#e8e4dc;color:var(--ink2);cursor:not-allowed;">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn-add" onclick="tambahEntri()">+ Tambah</button>
      </div>
    </div>
    <div id="form-err" style="color:var(--red);font-size:0.78rem;margin-top:10px;display:none;"></div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-header">
      <div class="table-title">// Riwayat Transaksi</div>
      <div class="table-actions">
        <button class="btn-sm btn-export" onclick="exportCSV()">↓ Export CSV</button>
        <button class="btn-sm btn-clear" onclick="hapusSemua()">✕ Hapus Semua</button>
      </div>
    </div>
    <div id="table-wrap">
      <div class="empty">
        <div class="empty-icon">📒</div>
        <div class="empty-text">Belum ada transaksi. Tambahkan entri pertamamu!</div>
      </div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ══════════════════════════════
//  DATA STORE
// ══════════════════════════════
let data = JSON.parse(localStorage.getItem('bukukas_data') || '[]');

// ══════════════════════════════
//  HELPERS
// ══════════════════════════════
function fmtRp(n) {
  if (n === null || n === undefined || n === '') return '—';
  return 'Rp ' + Number(n).toLocaleString('id-ID');
}

function fmtTgl(d) {
  if (!d) return '—';
  const [y,m,dd] = d.split('-');
  const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return `${dd} ${bulan[parseInt(m)-1]} ${y}`;
}

function simpan() {
  localStorage.setItem('bukukas_data', JSON.stringify(data));
}

function toast(msg, type='ok') {
  const icon = type === 'ok' ? '✓' : '✕';
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeftColor = type === 'ok' ? '#2d6a4f' : '#c1121f';
  el.innerHTML = `<span>${icon}</span> ${msg}`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ══════════════════════════════
//  AUTO HITUNG SALDO AKHIR
// ══════════════════════════════
document.getElementById('f-saldo-awal').addEventListener('input', hitungOtomatis);
document.getElementById('f-pengeluaran').addEventListener('input', hitungOtomatis);

function hitungOtomatis() {
  const awal   = parseFloat(document.getElementById('f-saldo-awal').value) || 0;
  const keluar = parseFloat(document.getElementById('f-pengeluaran').value) || 0;
  const akhir  = awal - keluar;
  document.getElementById('f-saldo-akhir').value = akhir;
  document.getElementById('f-saldo-akhir').style.color = akhir < 0 ? 'var(--red)' : 'var(--ink2)';
}

// ══════════════════════════════
//  TAMBAH ENTRI
// ══════════════════════════════
function tambahEntri() {
  const tgl     = document.getElementById('f-tanggal').value;
  const ket     = document.getElementById('f-keterangan').value.trim();
  const awal    = parseFloat(document.getElementById('f-saldo-awal').value) || 0;
  const keluar  = parseFloat(document.getElementById('f-pengeluaran').value) || 0;
  const akhir   = awal - keluar;
  const err     = document.getElementById('form-err');

  if (!tgl)  { err.textContent = '⚠ Tanggal wajib diisi!'; err.style.display='block'; return; }
  if (!ket)  { err.textContent = '⚠ Keterangan wajib diisi!'; err.style.display='block'; return; }
  if (awal < 0) { err.textContent = '⚠ Saldo awal tidak boleh negatif!'; err.style.display='block'; return; }
  err.style.display = 'none';

  data.push({
    id:     Date.now(),
    tgl,
    ket,
    awal,
    keluar,
    akhir
  });

  simpan();
  render();
  toast('Transaksi berhasil ditambahkan!');

  // reset form
  document.getElementById('f-keterangan').value = '';
  document.getElementById('f-saldo-awal').value = '';
  document.getElementById('f-pengeluaran').value = '';
  document.getElementById('f-saldo-akhir').value = '';
}

// ══════════════════════════════
//  HAPUS 1 BARIS
// ══════════════════════════════
function hapusBaris(id) {
  data = data.filter(d => d.id !== id);
  simpan();
  render();
  toast('Entri dihapus.', 'err');
}

// ══════════════════════════════
//  HAPUS SEMUA
// ══════════════════════════════
function hapusSemua() {
  if (!data.length) { toast('Tidak ada data!', 'err'); return; }
  if (!confirm('Yakin hapus semua data? Tidak bisa dibatalkan!')) return;
  data = [];
  simpan();
  render();
  toast('Semua data dihapus.', 'err');
}

// ══════════════════════════════
//  EXPORT CSV
// ══════════════════════════════
function exportCSV() {
  if (!data.length) { toast('Tidak ada data untuk diekspor!', 'err'); return; }
  const header = 'Tanggal,Keterangan,Saldo Awal,Pengeluaran,Saldo Akhir\n';
  const rows = data.map(d =>
    `${d.tgl},"${d.ket}",${d.awal},${d.keluar},${d.akhir}`
  ).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bukukas_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV berhasil diexport!');
}

// ══════════════════════════════
//  RENDER
// ══════════════════════════════
function render() {
  // summary
  const totalAwal   = data.reduce((s, d) => s + d.awal,   0);
  const totalKeluar = data.reduce((s, d) => s + d.keluar, 0);
  const totalAkhir  = totalAwal - totalKeluar;
  document.getElementById('sum-awal').textContent   = fmtRp(totalAwal);
  document.getElementById('sum-keluar').textContent = fmtRp(totalKeluar);
  document.getElementById('sum-akhir').textContent  = fmtRp(totalAkhir);
  document.getElementById('sum-akhir').style.color  = totalAkhir < 0 ? 'var(--red)' : 'var(--green)';

  const wrap = document.getElementById('table-wrap');

  if (!data.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">📒</div><div class="empty-text">Belum ada transaksi. Tambahkan entri pertamamu!</div></div>`;
    return;
  }

  // sort by tanggal
  const sorted = [...data].sort((a,b) => a.tgl.localeCompare(b.tgl));

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="width:32px">#</th>
          <th>Tanggal</th>
          <th>Keterangan</th>
          <th class="num">Saldo Awal</th>
          <th class="num">Pengeluaran</th>
          <th class="num">Saldo Akhir</th>
          <th style="width:36px"></th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map((d, i) => `
          <tr>
            <td class="row-num">${i+1}</td>
            <td class="date">${fmtTgl(d.tgl)}</td>
            <td class="keterangan">${d.ket}</td>
            <td class="num amount-in">${fmtRp(d.awal)}</td>
            <td class="num amount-out">${d.keluar > 0 ? fmtRp(d.keluar) : '—'}</td>
            <td class="num amount-bal ${d.akhir < 0 ? 'negative' : ''}">${fmtRp(d.akhir)}</td>
            <td><button class="btn-del" onclick="hapusBaris(${d.id})" title="Hapus baris ini">✕</button></td>
          </tr>`).join('')}
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">TOTAL</td>
          <td class="num">${fmtRp(totalAwal)}</td>
          <td class="num">${fmtRp(totalKeluar)}</td>
          <td class="num" style="color:${totalAkhir < 0 ? 'var(--red)' : 'var(--green)'}">${fmtRp(totalAkhir)}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>`;
}

// ══════════════════════════════
//  ENTER KEY SUBMIT
// ══════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName === 'INPUT') tambahEntri();
});

// ══════════════════════════════
//  INIT
// ══════════════════════════════
document.getElementById('f-tanggal').value = new Date().toISOString().split('T')[0];
document.getElementById('headerDate').textContent =
  new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

render();
</script>
</body>
</html>
