<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistika Toolkit - Isma Fuad</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e5e7eb;margin:0}
header{background:#1e293b;padding:25px;text-align:center}
h1{margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:25px;box-shadow:0 0 10px rgba(0,0,0,0.3)}
input{padding:7px;margin:4px;border-radius:6px;border:none;width:120px}
button{padding:10px 14px;border:none;border-radius:6px;background:#38bdf8;color:black;font-weight:bold;cursor:pointer;margin:5px}
button:hover{background:#0ea5e9}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #334155;padding:8px;text-align:center}
.result{font-size:18px;margin-top:10px}
.steps{background:#020617;padding:15px;border-radius:8px;line-height:1.6}
canvas{background:white;border-radius:8px;margin-top:20px}
footer{text-align:center;padding:15px;color:#94a3b8}
</style>
</head>

<body>

<header>
<h1>Statistika Toolkit</h1>
<p>Mean • Median • Modus • Variansi • Standar Deviasi • Skewness</p>
</header>

<div class="container">

<div class="card">
<h2>Input Data (boleh range seperti 64-68)</h2>
<p>Masukkan <b>kelas interval</b> atau <b>nilai tunggal</b> dan frekuensi</p>
<div id="inputs"></div>
<button onclick="addRow()">Tambah Baris</button>
<button onclick="clearData()">Reset</button>
<button onclick="hitung()">Hitung</button>
</div>

<div class="card">
<h2>Tabel Perhitungan</h2>
<table id="table"></table>
</div>

<div class="card">
<h2>Hasil</h2>
<div class="result" id="hasil"></div>
</div>

<div class="card">
<h2>Langkah Penyelesaian</h2>
<div class="steps" id="langkah"></div>
</div>

<div class="card">
<h2>Grafik Distribusi</h2>
<canvas id="chart"></canvas>
</div>

</div>

<footer>
Made with by Isma Fuad
</footer>

<script>

let chart

function addRow(){
let div=document.createElement("div")

div.innerHTML=`
Kelas / Nilai
<input type='text' class='kelas' placeholder='64-68 atau 67'>
Frekuensi
<input type='number' class='f'>
`

document.getElementById("inputs").appendChild(div)
}

addRow();addRow();addRow();addRow()

function clearData(){
let area=document.getElementById("inputs")
area.innerHTML=""
addRow();addRow();addRow()

document.getElementById("table").innerHTML=""
document.getElementById("hasil").innerHTML=""
document.getElementById("langkah").innerHTML=""

if(chart) chart.destroy()
}

function midpoint(val){
if(val.includes("-")){
let p=val.split("-")
let a=parseFloat(p[0])
let b=parseFloat(p[1])
return (a+b)/2
}
return parseFloat(val)
}

function hitung(){

let kelas=[...document.querySelectorAll('.kelas')].map(i=>i.value)
let fs=[...document.querySelectorAll('.f')].map(i=>Number(i.value))

let xs=kelas.map(midpoint)

let n=fs.reduce((a,b)=>a+b,0)

let fx=xs.map((x,i)=>x*fs[i])
let sumfx=fx.reduce((a,b)=>a+b,0)

let mean=sumfx/n

let rows="<tr><th>Kelas</th><th>x</th><th>f</th><th>fx</th><th>x-mean</th><th>(x-mean)^2</th><th>f(x-mean)^2</th></tr>"

let totalVar=0

xs.forEach((x,i)=>{

let diff=x-mean
let sq=diff*diff
let fvar=fs[i]*sq

totalVar+=fvar

rows+=`<tr>
<td>${kelas[i]}</td>
<td>${x}</td>
<td>${fs[i]}</td>
<td>${fx[i]}</td>
<td>${diff.toFixed(3)}</td>
<td>${sq.toFixed(3)}</td>
<td>${fvar.toFixed(3)}</td>
</tr>`

})

document.getElementById("table").innerHTML=rows

let variance=totalVar/(n-1)
let sd=Math.sqrt(variance)

let maxIndex=fs.indexOf(Math.max(...fs))
let mode=xs[maxIndex]

let skew=(mean-mode)/sd

let jenis=""

if(skew>0) jenis="Distribusi miring ke kanan"
else if(skew<0) jenis="Distribusi miring ke kiri"
else jenis="Distribusi simetris"


document.getElementById("hasil").innerHTML=`
Mean = ${mean.toFixed(3)}<br>
Modus ≈ ${mode}<br>
Variansi = ${variance.toFixed(3)}<br>
Standar Deviasi = ${sd.toFixed(3)}<br>
Skewness Pearson = ${skew.toFixed(3)}<br><br>
<b>${jenis}</b>
`

let langkah=`
<b>1. Mean</b><br>
Mean = Σfx / n<br>
Σfx = ${sumfx}<br>
n = ${n}<br>
Mean = ${mean.toFixed(3)}<br><br>

<b>2. Variansi</b><br>
Σf(x-mean)² = ${totalVar.toFixed(3)}<br>
Variansi = ${variance.toFixed(3)}<br><br>

<b>3. Standar Deviasi</b><br>
S = √Variansi = ${sd.toFixed(3)}<br><br>

<b>4. Skewness Pearson</b><br>
α = (Mean - Modus) / S<br>
α = ${skew.toFixed(3)}<br><br>

<b>Kesimpulan:</b> ${jenis}
`


document.getElementById("langkah").innerHTML=langkah

buatGrafik(kelas,fs)
}

function buatGrafik(labels,data){

if(chart) chart.destroy()

let ctx=document.getElementById("chart")

chart=new Chart(ctx,{
 type:'bar',
 data:{
 labels:labels,
 datasets:[{
 label:'Frekuensi',
 data:data
 }]
 }
})

}

</script>

</body>
</html>
